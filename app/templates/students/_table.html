<table class="table table-hover mb-0">
    <thead class="table-light">
        <tr>
            <th>姓名</th>
            <th>微信联系人</th>
            <th>课程分组</th>
            <th>上课时间</th>
            <th>电话</th>
            <th style="width: 160px;">操作</th>
        </tr>
    </thead>
    <tbody id="studentTableBody">
        {% if students %}
            {% for s in students %}
            <tr>
                <td><strong>{{ s.name }}</strong></td>
                <td>{{ s.parent_wechat or '-' }}</td>
                <td>
                    <span class="badge bg-info">{{ s.course_group.name if s.course_group else '未分组' }}</span>
                </td>
                <td class="small">{{ s.course_group.time_display if s.course_group else '-' }}</td>
                <td>{{ s.phone or '-' }}</td>
                <td>
                    <a href="{{ url_for('students.edit', id=s.id) }}" class="btn btn-sm btn-outline-primary" title="编辑">
                        <i class="bi bi-pencil"></i>
                    </a>
                    <button class="btn btn-sm btn-outline-secondary"
                            onclick="moveStudent({{ s.id }}, '{{ s.name }}', {{ s.course_group_id or 'null' }})"
                            title="移动分组">
                        <i class="bi bi-arrow-right-circle"></i>
                    </button>
                    <form method="POST" action="{{ url_for('students.delete', id=s.id) }}"
                          class="d-inline" onsubmit="return confirmDelete('确认删除学员 {{ s.name }}？');">
                        <button class="btn btn-sm btn-outline-danger" title="删除">
                            <i class="bi bi-trash"></i>
                        </button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        {% else %}
            <tr>
                <td colspan="6" class="text-center py-4 text-muted">
                    <i class="bi bi-inbox" style="font-size: 2rem;"></i>
                    <p class="mt-2 mb-0">暂无学员数据</p>
                </td>
            </tr>
        {% endif %}
    </tbody>
</table>
